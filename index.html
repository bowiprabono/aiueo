<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A sleek text converter tool that transforms words using vowel substitution rules.">
    <title>AIUEO Converter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#d946ef">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-512.png">
</head>
<body>
    <!-- Animated background orbs -->
    <div class="bg-orb bg-orb-1" aria-hidden="true"></div>
    <div class="bg-orb bg-orb-2" aria-hidden="true"></div>
    <div class="bg-orb bg-orb-3" aria-hidden="true"></div>

    <main class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="brand">
                <div class="logo" aria-hidden="true">
                    <span class="logo-letter">A</span>
                    <span class="logo-letter">I</span>
                    <span class="logo-letter">U</span>
                    <span class="logo-letter">E</span>
                    <span class="logo-letter">O</span>
                </div>

            </div>
            <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" aria-label="Toggle light mode">
                <span class="theme-toggle-icon" id="themeIcon">☀️</span>
                <span class="theme-toggle-label" id="themeLabel">Light</span>
            </button>
        </header>

        <!-- Top Row: Converter + How It Works -->
        <div class="top-row">
            <!-- Converter Card -->
            <section class="card converter-card" aria-label="Converter">
                <!-- Word Input -->
                <div class="input-group">
                    <label for="wordInput" class="input-label">Word</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7V4h16v3"/><path d="M9 20h6"/><path d="M12 4v16"/></svg>
                        <input type="text" id="wordInput" placeholder="e.g., example" autocomplete="off" spellcheck="false">
                    </div>
                </div>

                <!-- Suffix Number Input -->
                <div class="input-group">
                    <label for="numInput" class="input-label">Suffix Number</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 20h10"/><path d="M10 20c5.5-2.5.8-6.4 3-10"/><path d="M9.5 9.4c1.1.8 1.8 2.2 2.3 3.7-2 .4-3.5.4-4.8-.3-1.2-.6-2.3-1.9-3-4.2 2.8-.5 4.4 0 5.5.8z"/><path d="M14.1 6a7 7 0 0 0-1.1 4c1.9-.1 3.3-.6 4.3-1.4 1-1 1.6-2.3 1.7-4.6-2.7.1-4 1-4.9 2z"/></svg>
                        <input type="text" id="numInput" value="2560747" autocomplete="off">
                    </div>
                </div>

                <!-- Convert Button -->
                <button class="btn-convert" id="convertBtn" onclick="convertText()">
                    <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
                    Convert
                </button>
            </section>

            <!-- How It Works -->
            <section class="card info-card">
                <h2 class="info-title">How It Works</h2>
                <div class="rules-grid">
                    <div class="rule">
                        <span class="rule-step">1</span>
                        <div>
                            <strong>Vowel → Number</strong>
                            <p>A→1, I→2, U→3, E→4, O→5</p>
                        </div>
                    </div>
                    <div class="rule">
                        <span class="rule-step">2</span>
                        <div>
                            <strong>Extract Vowels</strong>
                            <p>Keep vowels only, UPPERCASE</p>
                        </div>
                    </div>
                    <div class="rule">
                        <span class="rule-step">3</span>
                        <div>
                            <strong>Combine</strong>
                            <p><code>word^VOWELS|number</code></p>
                        </div>
                    </div>
                </div>
                <div class="example-box">
                    <span class="example-label">Example</span>
                    <code>example → 4x1mpl4^EAE|2560747</code>
                </div>
            </section>
        </div>

        <!-- Result Card (full width below both) -->
        <section class="card result-card" id="resultCard" aria-label="Result" style="display:none;">
            <div class="result-header">
                <span class="result-badge">Result</span>
                <div class="result-tabs" id="resultTabs">
                    <button class="tab-btn active" id="tab-aiueo" onclick="switchTab('aiueo')">AIUEO Pattern</button>
                    <button class="tab-btn" id="tab-email" onclick="switchTab('email')">Email Pattern</button>
                    <button class="tab-btn" id="tab-base64" onclick="switchTab('base64')">Base64 Email Pattern</button>
                </div>
                <button class="btn-eye" id="eyeBtn" onclick="toggleVisibility()" aria-label="Toggle result visibility">
                    <!-- Eye closed (masked) icon -->
                    <svg id="eyeClosedIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                        <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                        <path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/>
                        <line x1="1" y1="1" x2="23" y2="23"/>
                    </svg>
                    <!-- Eye open (visible) icon -->
                    <svg id="eyeOpenIcon" style="display:none;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                </button>
            </div>
            <div class="result-value-container">
                <code class="result-value" id="resultText"></code>
                <code class="result-value result-masked" id="resultMasked"></code>
            </div>
            <button class="btn-copy" id="copyBtn" onclick="copyResult()">
                <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                <span id="copyLabel">Copy to Clipboard</span>
            </button>
        </section>

        <footer class="footer">
            <p>AIUEO Converter &middot; Created with AI</p>
        </footer>
    </main>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }
    </script>
</body>
</html>
